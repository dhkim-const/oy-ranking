name: Fetch OliveYoung Ranking

on:
  schedule:
    - cron: '10 * * * *'   # 매 시간 10분에 실행
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Slack ranking data
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            "https://slack.com/api/conversations.history?channel=C09P8JZ4UQ1&limit=200" \
            -o data.json

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: 랭킹 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git push
