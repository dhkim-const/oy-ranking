name: Fetch OliveYoung Ranking

on:
  schedule:
    - cron: '10 * * * *'   # 매 시간 10분에 실행
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch all Slack ranking data
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os

          token   = os.environ["SLACK_BOT_TOKEN"]
          channel = "C09P8JZ4UQ1"
          all_messages = []
          cursor = None

          for page in range(30):          # 최대 30페이지 = 6,000개 메시지
              url = f"https://slack.com/api/conversations.history?channel={channel}&limit=200"
              if cursor:
                  url += f"&cursor={cursor}"
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req) as r:
                  data = json.loads(r.read())

              if not data.get("ok"):
                  print(f"API error: {data.get('error')}")
                  break

              msgs = data.get("messages", [])
              all_messages.extend(msgs)
              print(f"Page {page+1}: {len(msgs)}개 수집 (누적 {len(all_messages)}개)")

              cursor = data.get("response_metadata", {}).get("next_cursor")
              if not cursor:
                  print("마지막 페이지 도달")
                  break

          result = {"ok": True, "messages": all_messages}
          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False)

          print(f"완료: 총 {len(all_messages)}개 메시지 저장")
          EOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: 랭킹 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git push
